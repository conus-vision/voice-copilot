<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>voice-copilot · settings</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="settings">
  <header>
    <a href="/" class="back">←</a>
    <h1>Settings</h1>
  </header>

  <main>
    <form id="settings-form">
      <fieldset>
        <legend>General</legend>
        <label>Language
          <select name="language">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="uk">Українська</option>
            <option value="ru">Русский</option>
          </select>
        </label>
      </fieldset>

      <fieldset>
        <legend>Hotkeys</legend>
        <label>Push-to-talk   <input name="hotkeys.push_to_talk" placeholder="alt+space" /></label>
        <label>Interrupt      <input name="hotkeys.interrupt"    placeholder="alt+shift+space" /></label>
        <label>Toggle mute    <input name="hotkeys.mute_toggle"  placeholder="alt+m" /></label>
        <label>Pause / resume CLI <input name="hotkeys.pause_toggle" placeholder="alt+p" /></label>
      </fieldset>

      <fieldset>
        <legend>Dialog</legend>
        <label>
          <input type="checkbox" name="dialog.auto_pause_on_speak" />
          Auto-pause the CLI while push-to-talk is held
        </label>
        <label>
          <input type="checkbox" name="dialog.deliver_immediately" />
          Deliver user message immediately (otherwise buffer until turn end)
        </label>
      </fieldset>

      <fieldset>
        <legend>TTS</legend>
        <label>Provider
          <select name="tts.name">
            <option value="edge-tts">edge-tts (free, cloud)</option>
            <option value="silero">silero (local)</option>
            <option value="piper">piper (local)</option>
            <option value="openai">openai-tts</option>
            <option value="elevenlabs">elevenlabs</option>
          </select>
        </label>
        <div class="actions">
          <button type="button" data-test-provider="tts">Test voice</button>
          <span data-test-status="tts"></span>
        </div>
      </fieldset>

      <fieldset>
        <legend>STT</legend>
        <label>Provider
          <select name="stt.name">
            <option value="openai-whisper-api">openai-whisper-api</option>
            <option value="faster-whisper">faster-whisper (local)</option>
            <option value="deepgram">deepgram</option>
          </select>
        </label>
        <div class="actions">
          <button type="button" data-test-provider="stt">Test</button>
          <span data-test-status="stt"></span>
        </div>
      </fieldset>

      <fieldset>
        <legend>Commentator LLM</legend>
        <label>Provider
          <select name="commentator.provider.name">
            <option value="anthropic">anthropic (Haiku 4.5)</option>
            <option value="openai">openai (gpt-4o-mini)</option>
            <option value="openai-compat">openai-compat (Ollama / LM Studio)</option>
          </select>
        </label>
        <label>Debounce, ms
          <input type="number" name="commentator.debounce_ms" min="200" max="5000" step="100" />
        </label>
        <label>Minimum importance
          <select name="commentator.min_importance">
            <option value="low">low — narrate everything</option>
            <option value="normal">normal — decisions &amp; edits</option>
            <option value="high">high — only critical</option>
          </select>
        </label>
        <div class="actions">
          <button type="button" data-test-provider="llm">Test</button>
          <span data-test-status="llm"></span>
        </div>
      </fieldset>

      <fieldset>
        <legend>API keys (stored in OS keychain)</legend>
        <p class="hint">Values never leave your machine — only the names of keys that are set are sent to the browser.</p>
        <div id="secrets-list"></div>
      </fieldset>

      <div class="actions">
        <button type="submit">Save</button>
        <span id="save-status"></span>
      </div>
    </form>
  </main>

  <script src="/static/settings.js"></script>
</body>
</html>
